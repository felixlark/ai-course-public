name: Publish Web Course

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install course verification tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes imagemagick ffmpeg
          command -v unzip
          command -v magick || command -v identify
          command -v convert
          command -v ffprobe

      - name: Verify and build the course
        env:
          VITEPRESS_BASE: ${{ steps.pages.outputs.base_path }}/
          VITEPRESS_REPOSITORY_URL: https://github.com/${{ github.repository }}
        run: pnpm release:verify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
