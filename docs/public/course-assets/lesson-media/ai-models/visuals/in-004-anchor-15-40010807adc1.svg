<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc"><title id="title">企业知识工作流</title><desc id="desc">让每一次生成都能回到权限、版本和原始依据</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7faff"/><stop offset="1" stop-color="#edf4ff"/></linearGradient></defs><rect width="1200" height="640" rx="32" fill="url(#bg)"/><text x="50" y="70" font-family="PingFang SC, Noto Sans CJK SC, sans-serif" font-size="38" font-weight="750" fill="#17324d">企业知识工作流</text><text x="50" y="116" font-family="PingFang SC, Noto Sans CJK SC, sans-serif" font-size="22" fill="#52687c">让每一次生成都能回到权限、版本和原始依据</text><g font-family="PingFang SC, Noto Sans CJK SC, sans-serif"><g><rect x="50" y="178" width="204" height="318" rx="24" fill="#ffffff" stroke="#c9d7ee" stroke-width="2"/><circle cx="84" cy="216" r="19" fill="#2855d9"/><text x="84" y="223" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">1</text><text x="72" y="280" font-size="25" font-weight="700" fill="#17324d">知识单元</text><line x1="72" y1="304" x2="232" y2="304" stroke="#dbe5f4" stroke-width="2"/><text x="72" y="354" font-size="21" fill="#3f5870"><tspan x="72" dy="0">文档与会议</tspan><tspan x="72" dy="38">来源·时间·权限</tspan></text><path d="M258 337 H268" stroke="#4b7bec" stroke-width="6" stroke-linecap="round"/><path d="M268 337 l-12 -8 v16 z" fill="#4b7bec"/></g><g><rect x="274" y="178" width="204" height="318" rx="24" fill="#ffffff" stroke="#c9d7ee" stroke-width="2"/><circle cx="308" cy="216" r="19" fill="#2855d9"/><text x="308" y="223" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">2</text><text x="296" y="280" font-size="25" font-weight="700" fill="#17324d">检索校准</text><line x1="296" y1="304" x2="456" y2="304" stroke="#dbe5f4" stroke-width="2"/><text x="296" y="354" font-size="21" fill="#3f5870"><tspan x="296" dy="0">按身份过滤</tspan><tspan x="296" dy="38">只取有效版本</tspan></text><path d="M482 337 H492" stroke="#4b7bec" stroke-width="6" stroke-linecap="round"/><path d="M492 337 l-12 -8 v16 z" fill="#4b7bec"/></g><g><rect x="498" y="178" width="204" height="318" rx="24" fill="#ffffff" stroke="#c9d7ee" stroke-width="2"/><circle cx="532" cy="216" r="19" fill="#2855d9"/><text x="532" y="223" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">3</text><text x="520" y="280" font-size="25" font-weight="700" fill="#17324d">带引用生成</text><line x1="520" y1="304" x2="680" y2="304" stroke="#dbe5f4" stroke-width="2"/><text x="520" y="354" font-size="21" fill="#3f5870"><tspan x="520" dy="0">答案附证据</tspan><tspan x="520" dy="38">缺证据即停止</tspan></text><path d="M706 337 H716" stroke="#4b7bec" stroke-width="6" stroke-linecap="round"/><path d="M716 337 l-12 -8 v16 z" fill="#4b7bec"/></g><g><rect x="722" y="178" width="204" height="318" rx="24" fill="#ffffff" stroke="#c9d7ee" stroke-width="2"/><circle cx="756" cy="216" r="19" fill="#2855d9"/><text x="756" y="223" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">4</text><text x="744" y="280" font-size="25" font-weight="700" fill="#17324d">审批交付</text><line x1="744" y1="304" x2="904" y2="304" stroke="#dbe5f4" stroke-width="2"/><text x="744" y="354" font-size="21" fill="#3f5870"><tspan x="744" dy="0">人工确认</tspan><tspan x="744" dy="38">再对外使用</tspan></text><path d="M930 337 H940" stroke="#4b7bec" stroke-width="6" stroke-linecap="round"/><path d="M940 337 l-12 -8 v16 z" fill="#4b7bec"/></g><g><rect x="946" y="178" width="204" height="318" rx="24" fill="#ffffff" stroke="#c9d7ee" stroke-width="2"/><circle cx="980" cy="216" r="19" fill="#2855d9"/><text x="980" y="223" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">5</text><text x="968" y="280" font-size="25" font-weight="700" fill="#17324d">使用度量</text><line x1="968" y1="304" x2="1128" y2="304" stroke="#dbe5f4" stroke-width="2"/><text x="968" y="354" font-size="21" fill="#3f5870"><tspan x="968" dy="0">命中与纠错</tspan><tspan x="968" dy="38">持续更新</tspan></text></g></g><text x="50" y="565" font-family="PingFang SC, Noto Sans CJK SC, sans-serif" font-size="20" fill="#2855d9">观察顺序：先确认输入与边界，再沿箭头检查每一步的证据、权限与反馈。</text></svg>